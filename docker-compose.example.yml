x-base: &base
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"
  security_opt:
    - no-new-privileges:true
  networks:
    - odysseus-internal

services:
  odysseus:
    <<: *base
    build: .
    container_name: odysseus
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/ssh:/app/.ssh
      - ./data/huggingface:/app/.cache/huggingface
    env_file:
      - .env
    environment:
      - SEARXNG_INSTANCE=http://searxng:8080
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      # PUID/PGID — UID/GID the container drops to at runtime.
      # Find yours with: id -u / id -g
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    networks:
      - odysseus-internal
      # Replace odysseus-gateway with your own external Docker network
      # that your reverse proxy / tunnel container is attached to.
      - odysseus-gateway

  chromadb:
    <<: *base
    image: chromadb/chroma:latest
    container_name: odysseus-chromadb
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  searxng:
    <<: *base
    image: searxng/searxng:latest
    container_name: odysseus-searxng
    volumes:
      - searxng-data:/etc/searxng
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ntfy — push notification service for task reminders.
  # Disabled by default. To enable:
  #   1. Uncomment this block and the ntfy-cache volume below.
  #   2. Set NTFY_BASE_URL to your publicly accessible ntfy hostname.
  #   3. Expose ntfy via your reverse proxy / tunnel on a separate hostname.
  #
  # ntfy:
  #   <<: *base
  #   image: binwiederhier/ntfy
  #   container_name: odysseus-ntfy
  #   command: serve
  #   volumes:
  #     - ntfy-cache:/var/cache/ntfy
  #   environment:
  #     - NTFY_BASE_URL=https://ntfy.your-domain.example.com
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "0.25"
  #         memory: 128M

volumes:
  searxng-data:
  chromadb-data:
  # ntfy-cache:

networks:
  odysseus-internal:
    # internal: true prevents all external routing from this network.
    # chromadb and searxng are only reachable from the odysseus container.
    internal: true
  odysseus-gateway:
    # This must be an already-existing external network shared with your
    # reverse proxy or tunnel container. Create it first:
    #   docker network create odysseus-gateway
    external: true
